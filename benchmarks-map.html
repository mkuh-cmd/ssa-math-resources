<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #2563eb;
  --nso: #2563eb;  --nso-bg: #eff6ff;  --nso-bd: #bfdbfe;
  --ar:  #7c3aed;  --ar-bg:  #f5f3ff;  --ar-bd:  #ddd6fe;
  --gr:  #059669;  --gr-bg:  #ecfdf5;  --gr-bd:  #a7f3d0;
  --dp:  #d97706;  --dp-bg:  #fffbeb;  --dp-bd:  #fde68a;
  --f:   #db2777;  --f-bg:   #fdf2f8;  --f-bd:   #fbcfe8;
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; }

header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 20px 28px 0; position: sticky; top: 0; z-index: 40; }
.top-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.back { font-size: .8rem; color: var(--accent); text-decoration: none; font-weight: 600; white-space: nowrap; }
.back:hover { text-decoration: underline; }
h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.4px; }
.subtitle { font-size: .8rem; color: #64748b; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 12px 0; }
.tabs { display: flex; gap: 4px; background: #f1f5f9; padding: 4px; border-radius: 10px; }
.tab { border: 0; background: transparent; padding: 7px 14px; border-radius: 7px; font: inherit; font-size: .82rem; font-weight: 600; color: #475569; cursor: pointer; }
.tab.active { background: #fff; color: var(--accent); box-shadow: 0 1px 3px rgba(15,23,42,.12); }
#search { flex: 1; min-width: 180px; max-width: 320px; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font: inherit; font-size: .82rem; }
#search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.legend { display: flex; gap: 6px; flex-wrap: wrap; }
.leg { border: 1px solid transparent; border-radius: 999px; padding: 4px 11px; font: inherit; font-size: .72rem; font-weight: 700; cursor: pointer; opacity: .45; }
.leg.on { opacity: 1; }
.leg.NSO { background: var(--nso-bg); color: var(--nso); border-color: var(--nso-bd); }
.leg.AR  { background: var(--ar-bg);  color: var(--ar);  border-color: var(--ar-bd); }
.leg.GR  { background: var(--gr-bg);  color: var(--gr);  border-color: var(--gr-bd); }
.leg.DP  { background: var(--dp-bg);  color: var(--dp);  border-color: var(--dp-bd); }
.leg.F   { background: var(--f-bg);   color: var(--f);   border-color: var(--f-bd); }
.hint { font-size: .72rem; color: #94a3b8; padding-bottom: 10px; }

main { padding: 20px 28px 60px; max-width: 1400px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

.chip { display: inline-block; margin: 3px 4px 3px 0; padding: 4px 9px; border-radius: 7px; border: 1px solid; font-size: .74rem; font-weight: 700; cursor: pointer; background: #fff; transition: transform .08s, opacity .3s ease; }
.chip:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(15,23,42,.15); }
.chip.NSO { background: var(--nso-bg); color: var(--nso); border-color: var(--nso-bd); }
.chip.AR  { background: var(--ar-bg);  color: var(--ar);  border-color: var(--ar-bd); }
.chip.GR  { background: var(--gr-bg);  color: var(--gr);  border-color: var(--gr-bd); }
.chip.DP  { background: var(--dp-bg);  color: var(--dp);  border-color: var(--dp-bd); }
.chip.F   { background: var(--f-bg);   color: var(--f);   border-color: var(--f-bd); }
.chip.dim, .row-item.dim { opacity: 0; pointer-events: none; }
.row-item { transition: opacity .3s ease; }
.hide { display: none !important; }
.chip .bm { font-weight: 800; }

.matrix { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
.matrix th { background: #f8fafc; text-align: left; font-size: .78rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; padding: 12px 14px; border-bottom: 1px solid #e2e8f0; }
.matrix th.gradecol { width: 30%; }
.matrix td { vertical-align: top; padding: 12px 14px; border-bottom: 1px solid #f1f5f9; }
.matrix tr:last-child td { border-bottom: 0; }
.strand-label { font-weight: 800; font-size: .82rem; }
.strand-label small { display: block; font-weight: 500; color: #94a3b8; font-size: .7rem; margin-top: 2px; }
.cluster { margin-bottom: 8px; }
.cluster:last-child { margin-bottom: 0; }
.cluster-name { font-size: .66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 2px; }
.na { color: #cbd5e1; font-size: .78rem; }

.grades { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.gcol { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
.gcol h2 { font-size: .95rem; font-weight: 800; padding: 14px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
.gcol h2 span { color: #94a3b8; font-weight: 600; font-size: .74rem; margin-left: 6px; }
.gsec { padding: 10px 16px 4px; }
.gsec-name { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.gsec-name.NSO { color: var(--nso); } .gsec-name.AR { color: var(--ar); } .gsec-name.GR { color: var(--gr); } .gsec-name.DP { color: var(--dp); } .gsec-name.F { color: var(--f); }
.row-item { display: flex; gap: 8px; align-items: baseline; padding: 5px 8px; margin: 0 -8px; border-radius: 8px; cursor: pointer; }
.row-item:hover { background: #f1f5f9; }
.row-item .code { font-size: .72rem; font-weight: 800; white-space: nowrap; }
.row-item .code.NSO { color: var(--nso); } .row-item .code.AR { color: var(--ar); } .row-item .code.GR { color: var(--gr); } .row-item .code.DP { color: var(--dp); } .row-item .code.F { color: var(--f); }
.row-item .short { font-size: .74rem; color: #475569; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.threads { display: flex; flex-direction: column; gap: 12px; }
.thread { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px 16px; }
.thread-head { margin-bottom: 8px; }
.thread-head b { font-size: .88rem; }
.thread-head small { display: block; color: #94a3b8; font-size: .72rem; margin-top: 1px; }
.thread-cols { display: grid; grid-template-columns: 1fr 28px 1fr 28px 1fr; align-items: start; }
.tcell { min-height: 34px; }
.tarrow { display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.1rem; padding-top: 6px; }
.tgrade { font-size: .64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 3px; }
.tnone { color: #cbd5e1; font-size: .74rem; padding-top: 2px; }

#overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
#overlay.open { display: flex; }
#modal { background: #fff; border-radius: 16px; max-width: 640px; width: 100%; max-height: 85vh; overflow: auto; padding: 24px 26px; box-shadow: 0 24px 60px rgba(15,23,42,.3); }
#modal .m-code { font-size: 1.15rem; font-weight: 800; }
#modal .m-tags { margin: 6px 0 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.m-tag { font-size: .68rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; border: 1px solid; }
#modal .m-desc { font-size: .92rem; line-height: 1.55; color: #1e293b; margin-bottom: 16px; }
#modal h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin: 14px 0 6px; }
.doc-link { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 6px; text-decoration: none; color: #0f172a; font-size: .82rem; }
.doc-link:hover { border-color: var(--accent); background: #eff6ff; }
.doc-link .dq { font-size: .7rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
.m-close { float: right; border: 0; background: #f1f5f9; border-radius: 8px; width: 30px; height: 30px; font-size: 1rem; cursor: pointer; color: #475569; }
.m-nodocs { font-size: .8rem; color: #94a3b8; }

@media (max-width: 900px) {
  .grades { grid-template-columns: 1fr; }
  .thread-cols { grid-template-columns: 1fr; }
  .tarrow { transform: rotate(90deg); padding: 0; }
  main, header { padding-left: 14px; padding-right: 14px; }
}
@media print {
  header { position: static; }
  .controls, .back, .hint { display: none; }
}
</style>

const THREADS = [{"name": "Rational & Real Numbers", "sub": "Plotting, ordering, comparing; equivalent forms; irrational numbers", "g6": ["MA.6.NSO.1.1", "MA.6.NSO.1.2", "MA.6.NSO.3.5"], "g7": ["MA.7.NSO.1.2"], "g8": ["MA.8.NSO.1.1", "MA.8.NSO.1.2"]}, {"name": "Absolute Value & Order of Operations", "sub": "Absolute value → multi-step order of operations → exponents & radicals", "g6": ["MA.6.NSO.1.3", "MA.6.NSO.1.4"], "g7": ["MA.7.NSO.2.1"], "g8": ["MA.8.NSO.1.7"]}, {"name": "Operations Fluency", "sub": "Decimals, fractions & integers → all rational numbers", "g6": ["MA.6.NSO.2.1", "MA.6.NSO.2.2", "MA.6.NSO.2.3", "MA.6.NSO.4.1", "MA.6.NSO.4.2"], "g7": ["MA.7.NSO.2.2", "MA.7.NSO.2.3"], "g8": []}, {"name": "Factors, Exponents & Scientific Notation", "sub": "GCF/LCM & prime factorization → Laws of Exponents → scientific notation", "g6": ["MA.6.NSO.3.1", "MA.6.NSO.3.2", "MA.6.NSO.3.3", "MA.6.NSO.3.4"], "g7": ["MA.7.NSO.1.1"], "g8": ["MA.8.NSO.1.3", "MA.8.NSO.1.4", "MA.8.NSO.1.5", "MA.8.NSO.1.6"]}, {"name": "Algebraic Expressions", "sub": "Translate & evaluate → linear expressions → multiply & factor", "g6": ["MA.6.AR.1.1", "MA.6.AR.1.2", "MA.6.AR.1.3", "MA.6.AR.1.4"], "g7": ["MA.7.AR.1.1", "MA.7.AR.1.2"], "g8": ["MA.8.AR.1.1", "MA.8.AR.1.2", "MA.8.AR.1.3"]}, {"name": "Equations & Inequalities", "sub": "One-step → two-step → multi-step with variables on both sides", "g6": ["MA.6.AR.2.1", "MA.6.AR.2.2", "MA.6.AR.2.3", "MA.6.AR.2.4"], "g7": ["MA.7.AR.2.1", "MA.7.AR.2.2"], "g8": ["MA.8.AR.2.1", "MA.8.AR.2.2", "MA.8.AR.2.3"]}, {"name": "Ratios → Proportions → Linear Relationships", "sub": "Ratios & rates → proportional relationships → slope & slope-intercept form", "g6": ["MA.6.AR.3.1", "MA.6.AR.3.2", "MA.6.AR.3.3", "MA.6.AR.3.4", "MA.6.AR.3.5"], "g7": ["MA.7.AR.3.1", "MA.7.AR.3.2", "MA.7.AR.3.3", "MA.7.AR.4.1", "MA.7.AR.4.2", "MA.7.AR.4.3", "MA.7.AR.4.4", "MA.7.AR.4.5"], "g8": ["MA.8.AR.3.1", "MA.8.AR.3.2", "MA.8.AR.3.3", "MA.8.AR.3.4", "MA.8.AR.3.5"]}, {"name": "Systems of const STRANDS = {
  NSO: "Number Sense & Operations",
  AR: "Algebraic Reasoning",
  GR: "Geometric Reasoning",
  DP: "Data Analysis & Probability",
  F: "Functions"
};
const STRAND_ORDER = ["NSO","AR","GR","DP","F"];
const byCode = {};
DATA.forEach(b => byCode[b.c] = b);

let activeStrands = new Set(STRAND_ORDER);
let query = "";

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function chip(b){
  return `<button class="chip ${b.s}" data-code="${b.c}" title="${esc(b.d)}"><span class="bm">${b.c.replace("MA.","")}</span></button>`;
}

function buildMatrix(){
  let html = `<table class="matrix"><thead><tr><th style="width:16%">Strand</th><th class="gradecol">Grade 6</th><th class="gradecol">Grade 7</th><th class="gradecol">Grade 8</th></tr></thead><tbody>`;
  for (const s of STRAND_ORDER){
    html += `<tr class="mrow"><td class="strand-label" style="color:var(--${s.toLowerCase()})">${s}<small>${STRANDS[s]}</small></td>`;
    for (const g of [6,7,8]){
      const items = DATA.filter(b => b.s===s && b.g===g);
      if (!items.length){ html += `<td><span class="na">&#8212;</span></td>`; continue; }
      const clusters = {};
      items.forEach(b => (clusters[b.cl] = clusters[b.cl]||[]).push(b));
      html += `<td>` + Object.keys(clusters).sort().map(cl =>
        `<div class="cluster"><div class="cluster-name">${cl}</div>${clusters[cl].map(chip).join("")}</div>`
      ).join("") + `</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById("view-matrix").innerHTML = html;
}

function buildGrade(){
  let html = `<div class="grades">`;
  for (const g of [6,7,8]){
    const items = DATA.filter(b => b.g===g);
    html += `<div class="gcol"><h2>Grade ${g}<span>${items.length} benchmarks</span></h2>`;
    for (const s of STRAND_ORDER){
      const list = items.filter(b => b.s===s);
      if (!list.length) continue;
      html += `<div class="gsec"><div class="gsec-name ${s}">${STRANDS[s]}</div>`;
      html += list.map(b =>
        `<div class="row-item" data-code="${b.c}" title="${esc(b.d)}"><span class="code ${b.s}">${b.c.replace("MA.","")}</span><span class="short">${esc(b.d)}</span></div>`
      ).join("");
      html += `</div>`;
    }
    html += `<div style="height:10px"></div></div>`;
  }
  html += `</div>`;
  document.getElementById("view-grade").innerHTML = html;
}

function buildProg(){
  let html = `<div class="threads">`;
  for (const t of THREADS){
    html += `<div class="thread"><div class="thread-head"><b>${t.name}</b><small>${t.sub}</small></div><div class="thread-cols">`;
    const cells = [t.g6, t.g7, t.g8];
    for (let i=0;i<3;i++){
      const codes = cells[i];
      html += `<div class="tcell"><div class="tgrade">Grade ${6+i}</div>` +
        (codes.length ? codes.map(c => chip(byCode[c])).join("") : `<div class="tnone">&#8212;</div>`) + `</div>`;
      if (i<2) html += `<div class="tarrow">&#8594;</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById("view-prog").innerHTML = html;
}

function buildLegend(){
  document.getElementById("legend").innerHTML = STRAND_ORDER.map(s =>
    `<button class="leg ${s} on" data-strand="${s}">${s}</button>`).join("");
}

/* Filtering: fade out (0.3s), then collapse from layout */
const CONTAINERS = ".cluster, .gsec, .thread, .mrow";
let filterTimer;
function applyFilter(){
  const q = query.trim().toLowerCase();
  document.querySelectorAll("[data-code]").forEach(el => {
    const b = byCode[el.dataset.code];
    const strandOK = activeStrands.has(b.s);
    const qOK = !q || b.c.toLowerCase().includes(q) || b.d.toLowerCase().includes(q);
    if (strandOK && qOK){
      el.classList.remove("hide");
      requestAnimationFrame(() => el.classList.remove("dim"));
    } else {
      el.classList.add("dim");
    }
  });
  document.querySelectorAll(CONTAINERS).forEach(c => {
    if ([...c.querySelectorAll("[data-code]")].some(el => !el.classList.contains("dim")))
      c.classList.remove("hide");
  });
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => {
    document.querySelectorAll("[data-code].dim").forEach(el => el.classList.add("hide"));
    document.querySelectorAll(CONTAINERS).forEach(c => {
      const any = [...c.querySelectorAll("[data-code]")].some(el => !el.classList.contains("hide"));
      c.classList.toggle("hide", !any);
    });
  }, 320);
}

function openModal(code){
  const b = byCode[code];
  const overlay = document.getElementById("overlay");
  let docs = "";
  if (b.m.length){
    docs = b.m.map(d =>
      `<a class="doc-link" href="${d.href}" target="_blank" rel="noopener"><span>&#128196; Big-M &#8212; ${d.course}</span><span class="dq">${d.q}</span></a>`).join("");
  } else {
    docs = `<div class="m-nodocs">No Big-M document in the folder yet for this benchmark.</div>`;
  }
  document.getElementById("modal").innerHTML = `
    <button class="m-close" onclick="document.getElementById('overlay').classList.remove('open')">&#10005;</button>
    <div class="m-code" style="color:var(--${b.s.toLowerCase()})">${b.c}</div>
    <div class="m-tags">
      <span class="m-tag" style="color:var(--${b.s.toLowerCase()});border-color:var(--${b.s.toLowerCase()})">${STRANDS[b.s]}</span>
      <span class="m-tag" style="color:#64748b;border-color:#cbd5e1">Grade ${b.g}</span>
    </div>
    <div class="m-desc">${esc(b.d)}</div>
    <h3>SSA Big-M Documents</h3>
    ${docs}`;
  overlay.classList.add("open");
}

document.addEventListener("click", e => {
  const t = e.target.closest("[data-code]");
  if (t){ openModal(t.dataset.code); return; }
  const tab = e.target.closest(".tab");
  if (tab){
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x===tab));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById("view-"+tab.dataset.view).classList.add("active");
    return;
  }
  const leg = e.target.closest(".leg");
  if (leg){
    const s = leg.dataset.strand;
    if (activeStrands.has(s) && activeStrands.size===1){ activeStrands = new Set(STRAND_ORDER); }
    else if (activeStrands.size===STRAND_ORDER.length){ activeStrands = new Set([s]); }
    else if (activeStrands.has(s)){ activeStrands.delete(s); if(!activeStrands.size) activeStrands = new Set(STRAND_ORDER); }
    else activeStrands.add(s);
    document.querySelectorAll(".leg").forEach(l => l.classList.toggle("on", activeStrands.has(l.dataset.strand)));
    applyFilter();
    return;
  }
  if (e.target.id === "overlay") document.getElementById("overlay").classList.remove("open");
});
document.addEventListener("keydown", e => { if (e.key === "Escape") document.getElementById("overlay").classList.remove("open"); });
document.getElementById("search").addEventListener("input", e => { query = e.target.value; applyFilter(); });

buildLegend(); buildMatrix(); buildGrade(); buildProg();
</script>
