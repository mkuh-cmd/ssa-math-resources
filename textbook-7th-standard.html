<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7th Grade Standard Textbook — SSA Math</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; }

  header { background: #1a3a6b; color: white; padding: 24px 32px; }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header p { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }

  .tabs {
    display: flex; gap: 2px; background: #13305c;
    padding: 0 24px; overflow-x: auto;
  }
  .tab-btn {
    background: none; border: none; color: rgba(255,255,255,0.7);
    padding: 12px 16px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
    white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab-btn:hover { color: white; }
  .tab-btn.active { color: #f9c74f; border-bottom-color: #f9c74f; }

  .content { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .section-label { font-size: 0.78rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

  .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  .unit-card { background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); overflow: hidden; }
  .unit-header { background: #1a3a6b; color: white; padding: 9px 14px; font-weight: 700; font-size: 0.9rem; }
  .unit-links { padding: 8px 14px 12px; }
  .unit-links a {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 0; color: #1a3a6b; text-decoration: none;
    font-size: 0.82rem; border-bottom: 1px solid #eee;
  }
  .unit-links a:last-child { border-bottom: none; }
  .unit-links a:hover { color: #c0392b; }

  /* Practice two-column split inside each unit card */
  .practice-cols { display: grid; grid-template-columns: 1fr 1fr; }
  .practice-col { padding: 8px 12px 12px; }
  .practice-col:first-child { border-right: 1px solid #eee; }
  .practice-col-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 6px; }
  .practice-col a {
    display: block; padding: 4px 0; color: #1a3a6b;
    text-decoration: none; font-size: 0.8rem; border-bottom: 1px solid #f0f0f0;
  }
  .practice-col a:last-child { border-bottom: none; }
  .practice-col a:hover { color: #c0392b; }

  /* Assessments */
  .assess-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media(max-width:700px){ .assess-grid { grid-template-columns: 1fr; } }
  .assess-col { background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); overflow: hidden; }
  .assess-header { padding: 9px 14px; font-weight: 700; font-size: 0.88rem; color: white; }
  .blank-h { background: #2c3e50; }
  .key-h   { background: #27ae60; }
  .guide-h { background: #8e44ad; }
  .assess-links { padding: 8px 14px 12px; }
  .assess-links a { display: block; padding: 5px 0; color: #1a3a6b; text-decoration: none; font-size: 0.82rem; border-bottom: 1px solid #eee; }
  .assess-links a:last-child { border-bottom: none; }
  .assess-links a:hover { color: #27ae60; }
</style>
</head>
<body>

<header>
  <h1>7th Grade Standard — Textbook Curriculum</h1>
  <p>South Seminole Academy · Math Department · 26–27 School Year</p>
</header>

<nav class="tabs">
  <button class="tab-btn active"  onclick="showTab('slides',this)">📊 Presentation Slides</button>
  <button class="tab-btn"         onclick="showTab('student',this)">📄 Student Pages</button>
  <button class="tab-btn"         onclick="showTab('teacher',this)">👩‍🏫 Teacher Pages</button>
  <button class="tab-btn"         onclick="showTab('practice',this)">✏️ Practice Pages</button>
  <button class="tab-btn"         onclick="showTab('assess',this)">📝 Assessments</button>
</nav>

<div class="content">
  <div id="tab-slides"  class="tab-panel active"><p class="section-label">Presentation Slides (.pptx) — click to download</p><div class="unit-grid" id="slides-grid"></div></div>
  <div id="tab-student" class="tab-panel"><p class="section-label">Student Pages (.pdf)</p><div class="unit-grid" id="student-grid"></div></div>
  <div id="tab-teacher" class="tab-panel"><p class="section-label">Teacher Pages (.pdf)</p><div class="unit-grid" id="teacher-grid"></div></div>
  <div id="tab-practice" class="tab-panel"><p class="section-label">Practice Pages by Lesson</p><div class="unit-grid" id="practice-grid"></div></div>
  <div id="tab-assess"  class="tab-panel"><p class="section-label">Unit Assessments</p><div class="assess-grid" id="assess-grid"></div></div>
</div>

<script>
const BASE = "3.%20Textbook/4.%207th%20Standard";
const e = encodeURIComponent;

const unitLessons = {1:6,2:9,3:8,4:10,5:10,6:11,7:10,8:6,9:8,10:10,11:9,12:6,13:9};

function showTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function buildGrid(gridId, section, filePattern, icon, download) {
  const grid = document.getElementById(gridId);
  for (let u = 1; u <= 13; u++) {
    const count = unitLessons[u];
    let links = '';
    for (let l = 1; l <= count; l++) {
      const file = filePattern(u, l);
      const url = `${BASE}/${e(section)}/${e('Unit '+u)}/${e(file)}`;
      links += `<a href="${url}" ${download?'download':' target="_blank"'}>${icon} ${file}</a>`;
    }
    grid.innerHTML += `<div class="unit-card"><div class="unit-header">Unit ${u}</div><div class="unit-links">${links}</div></div>`;
  }
}

// Presentation Slides
buildGrid('slides-grid', '1. Presentation Slide', (u,l) => `Unit ${u}.${l}.pptx`, '📊', true);

// Student Pages
buildGrid('student-grid', '2. Student Pages', (u,l) => `Unit ${u}.${l}.pdf`, '📄', false);

// Teacher Pages
buildGrid('teacher-grid', '3. Teacher Pages', (u,l) => `Lesson ${u}.${l} [T].pdf`, '📄', false);

// Practice Pages — Blank | Key split columns
(function buildPractice() {
  const grid = document.getElementById('practice-grid');
  for (let u = 1; u <= 13; u++) {
    const count = unitLessons[u];
    let blanks = '', keys = '';
    for (let l = 1; l <= count; l++) {
      const blankFile = `Lesson ${u}.${l} [P].pdf`;
      const keyFile   = `Lesson ${u}.${l} [P.K].pdf`;
      const blankUrl  = `${BASE}/${e('4. Practice Page')}/${e('Blank')}/${e('Unit '+u)}/${e(blankFile)}`;
      const keyUrl    = `${BASE}/${e('4. Practice Page')}/${e('Key')}/${e('Unit '+u)}/${e(keyFile)}`;
      blanks += `<a href="${blankUrl}" target="_blank">📄 Lesson ${u}.${l}</a>`;
      keys   += `<a href="${keyUrl}"   target="_blank">✅ Lesson ${u}.${l}</a>`;
    }
    grid.innerHTML += `
      <div class="unit-card">
        <div class="unit-header">Unit ${u}</div>
        <div class="practice-cols">
          <div class="practice-col">
            <div class="practice-col-label">Blank</div>${blanks}
          </div>
          <div class="practice-col">
            <div class="practice-col-label">Key</div>${keys}
          </div>
        </div>
      </div>`;
  }
})();

// Assessments
(function buildAssess() {
  const grid = document.getElementById('assess-grid');
  const AD = `${BASE}/${e('5. Unit Assessments')}`;

  const blanks = [
    "Unit 1 Assessment[blank].pdf",
    "Unit 2 Assessment[blank].pdf",
    "Unit 3A - Part 1 Assessment[blank].pdf",
    "Unit 3B - Part 1 Assessment[blank].pdf",
    "Unit 3C - Part 1 Assessment[blank].pdf",
    "Unit 3 - Part 2 Assessment[blank].pdf",
    "Unit 4 Assessment[blank].pdf","Unit 5 Assessment[blank].pdf",
    "Unit 6 Assessment[blank].pdf","Unit 7 Assessment[blank].pdf",
    "Unit 8 Assessment[blank].pdf","Unit 9 Assessment[blank].pdf",
    "Unit 10 Assessment[blank].pdf","Unit 11 Assessment[blank].pdf",
    "Unit 12 Assessment[blank].pdf","Unit 13 Assessment[blank].pdf"
  ];
  const blankLinks = blanks.map(f =>
    `<a href="${AD}/${e('1. Blank')}/${e(f)}" target="_blank">📄 ${f.replace('[blank]','').trim()}</a>`
  ).join('');

  const keys = [
    "Unit 1 Assessment [Key].pdf",
    "Unit 2 Assessment [Key].pdf",
    "Unit 3A Assessment[Key].pdf",
    "Unit 3A - Part 1 Assessment[Key].pdf",
    "Unit 3B Assessment[Key].pdf",
    "Unit 3B - Part 1 Assessment[Key].pdf",
    "Unit 3C Assessment[Key].pdf",
    "Unit 3C - Part 1 Assessment[Key].pdf",
    "Unit 3 - Part 2 Assessment[Key].pdf",
    "Unit 4 Assessment [Key].pdf","Unit 5 Assessment [Key].pdf",
    "Unit 6 Assessment [Key].pdf","Unit 7 Assessment [Key].pdf",
    "Unit 8 Assessment [Key].pdf","Unit 9 Assessment [Key].pdf",
    "Unit 10 Assessment [Key].pdf","Unit 11 Assessment [Key].pdf",
    "Unit 12 Assessment [Key].pdf","Unit 13 Assessment [Key].pdf"
  ];
  const keyLinks = keys.map(f =>
    `<a href="${AD}/${e('2. Key')}/${e(f)}" target="_blank">✅ ${f.replace('[Key]','Key').replace(/\s+/g,' ').trim()}</a>`
  ).join('');

  const guides = [
    "Unit 1 Assessment [Guide].pdf","Unit 2 Assessment [Guide].pdf",
    "Unit 3 - Part 1 Assessment [Guide].pdf","Unit 3 - Part 2 Assessment [Guide].pdf",
    "Unit 4 Assessment [Guide].pdf","Unit 5 Assessment [Guide].pdf",
    "Unit 6 Assessment [Guide].pdf","Unit 7 Assessment [Guide].pdf",
    "Unit 8 Assessment [Guide].pdf","Unit 9 Assessment [Guide].pdf",
    "Unit 10 Assessment [Guide].pdf","Unit 11 Assessment [Guide].pdf",
    "Unit 12 Assessment [Guide].pdf","Unit 13 Assessment [Guide].pdf"
  ];
  const guideLinks = guides.map(f =>
    `<a href="${AD}/${e('3. Guide')}/${e(f)}" target="_blank">📋 ${f.replace('[Guide]','Guide').trim()}</a>`
  ).join('');

  grid.innerHTML = `
    <div class="assess-col"><div class="assess-header blank-h">📝 Blank Assessments</div><div class="assess-links">${blankLinks}</div></div>
    <div class="assess-col"><div class="assess-header key-h">✅ Answer Keys</div><div class="assess-links">${keyLinks}</div></div>
    <div class="assess-col"><div class="assess-header guide-h">📋 Assessment Guides</div><div class="assess-links">${guideLinks}</div></div>`;
})();
</script>
</body>
</html>
